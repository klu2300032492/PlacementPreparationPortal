<!DOCTYPE html>
<html>

<head>
    <title>Results</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Your Test History</h2>

    <table class="table table-bordered">

        <tr>
            <th>Score</th>
            <th>Date</th>
        </tr>

        {% for r in results %}

        <tr>
            <td>{{ r[2] }}</td>
            <td>{{ r[3] }}</td>
        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
