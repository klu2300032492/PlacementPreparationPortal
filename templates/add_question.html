<!DOCTYPE html>
<html>
<head>
    <title>Add Question</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Add Aptitude Question</h2>

    <form method="POST">

        <div class="mb-3">
            <label>Question</label>
            <textarea name="question"
                      class="form-control"
                      required></textarea>
        </div>

        <div class="mb-3">
            <label>Option 1</label>
            <input type="text"
                   name="option1"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Option 2</label>
            <input type="text"
                   name="option2"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Option 3</label>
            <input type="text"
                   name="option3"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Option 4</label>
            <input type="text"
                   name="option4"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Correct Answer</label>
            <input type="text"
                   name="answer"
                   class="form-control"
                   required>
        </div>

        <button class="btn btn-success">
            Save Question
        </button>

    </form>

</div>

</body>
</html>
