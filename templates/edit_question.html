<!DOCTYPE html>
<html>
<head>
    <title>Edit Question</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Edit Question</h2>

    <form method="POST">

        <div class="mb-3">
            <label>Question</label>

            <textarea name="question"
                      class="form-control">{{ q[1] }}</textarea>
        </div>

        <div class="mb-3">
            <label>Option 1</label>

            <input type="text"
                   name="option1"
                   value="{{ q[2] }}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Option 2</label>

            <input type="text"
                   name="option2"
                   value="{{ q[3] }}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Option 3</label>

            <input type="text"
                   name="option3"
                   value="{{ q[4] }}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Option 4</label>

            <input type="text"
                   name="option4"
                   value="{{ q[5] }}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Correct Answer</label>

            <input type="text"
                   name="answer"
                   value="{{ q[6] }}"
                   class="form-control">
        </div>

        <button class="btn btn-success">
            Update Question
        </button>

    </form>

</div>

</body>
</html>
