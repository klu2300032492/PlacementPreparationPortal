<!DOCTYPE html>
<html>
<head>
    <title>Aptitude Test</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Aptitude Test</h2>

    <form method="POST">

        {% for q in questions %}

        <div class="card mb-3">

            <div class="card-body">

                <h5>{{ q[1] }}</h5>

                <input type="radio"
                       name="q{{ q[0] }}"
                       value="{{ q[2] }}">
                {{ q[2] }}
                <br>

                <input type="radio"
                       name="q{{ q[0] }}"
                       value="{{ q[3] }}">
                {{ q[3] }}
                <br>

                <input type="radio"
                       name="q{{ q[0] }}"
                       value="{{ q[4] }}">
                {{ q[4] }}
                <br>

                <input type="radio"
                       name="q{{ q[0] }}"
                       value="{{ q[5] }}">
                {{ q[5] }}

            </div>

        </div>

        {% endfor %}

        <button class="btn btn-success">
            Submit Test
        </button>

    </form>

</div>

</body>
</html>
