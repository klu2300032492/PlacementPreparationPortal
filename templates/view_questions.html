<!DOCTYPE html>
<html>
<head>
    <title>View Questions</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>All Questions</h2>

    <table class="table table-bordered">

        <tr>
            <th>ID</th>
            <th>Question</th>
            <th>Answer</th>
            <th>Action</th>
        </tr>

        {% for q in questions %}

        <tr>

            <td>{{ q[0] }}</td>

            <td>{{ q[1] }}</td>

            <td>{{ q[6] }}</td>

            <td>
                <a href="/edit_question/{{ q[0] }}"
       class="btn btn-warning">
       Edit
    </a>
                <a href="/delete_question/{{ q[0] }}"
                   class="btn btn-danger">
                   Delete
                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
